<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeDash | Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <video autoplay muted loop id="myVideo">
        <source src="images/coffee login.mp4" type="video/mp4">
    </video>

    
    <div class="content">
        <div class="wrapper">
            <form action="">
                <h1>Forgot Password</h1>
                <div class="logo"><img src="images/logo.png" alt="logo" style="width:200px;height:200px;"></div>
                <div class="textbox">
                    <input type="email" placeholder="Enter your email" required>
                    <i class='bx bx-envelope'></i>
                </div>

                <button type="submit" class="btn">Reset Password</button>

                <div class="back-to-login">
                    <p>Remembered your password? <a href="login.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
