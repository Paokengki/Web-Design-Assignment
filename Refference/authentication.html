<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeDash | Authentication</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <video autoplay muted loop id="myVideo">
        <source src="images/coffee login.mp4" type="video/mp4">
    </video>

    <div class="content">
        <div class="wrapper">
            <form id="register-form" action="authentication.html">
                <h1>Authentication</h1>
                <div class="logo"><img src="images/logo.png" alt="logo" style="width:200px;height:200px;"></div>
                <div class="textbox">
                    <p>ARE YOU A ROBOT?</p>
                </div>

                <button type="submit" class="btn">YES</button>
                <button type="button" class="btn" onclick="redirectToLogin()">NO</button>
            </form>
        </div>
    </div>

    <script>
        function redirectToLogin() {
            window.location.href = "login.html";
        }
    </script>
</body>

</html>
