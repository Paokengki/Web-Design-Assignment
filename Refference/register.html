<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeDash | Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <video autoplay muted loop id="myVideo">
        <source src="images/coffee login.mp4" type="video/mp4">
    </video>

    
    <div class="content">
        <div class="wrapper">
            <form id="register-form" action="authentication.html">
                <h1>Register</h1>
                <div class="logo"><img src="images/logo.png" alt="logo" style="width:200px;height:200px;"></div>
                <div class="textbox">
                    <input type="text" placeholder="Full Name" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="textbox">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bx-envelope'></i>
                </div>
                <div class="textbox">
                    <input type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>

                <button class="btn" onclick="window.location.href='authentication.html'" >Register</button>

                <div class="back-to-login">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
