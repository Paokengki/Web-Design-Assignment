<!DOCTYPE html>
<html>
<head>
	<title>PAYMENT METHOD</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/payment style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,
	wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;
	1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
	<div class="container">
	
		<form action="">
		
			<div class="row">
		
				<div class="col">
					<h3 class="title">billing address</h3>
					
					<div class="inputBox">
						<span>full name:</span>
						<input type="text"placeholder="john deo">
					</div>
					<div class="inputBox">
						<span>email:</span>
						<input type="email"placeholder="example@example.com">
					</div>
					<div class="inputBox">
						<span>address:</span>
						<input type="text"placeholder="room-street-locality">
					</div>
					<div class="inputBox">
						<span>city:</span>
						<input type="text"placeholder="Kuala Lumpur">
					</div>
					<div class="flex">
						<div class="inputBox">
							<span>state:</span>
							<input type="text"placeholder="Selangor">
						</div>
						<div class="inputBox">
							<span>zip code:</span>
							<input type="text"placeholder="123456">
						</div>
					</div>
					
				</div>
				
				<div class="col">
					<h3 class="title">payment</h3>
									
					<div class="inputBox">
						<span>Cards accepted:</span>
						<img src="images/card.jpg" alt="card">
					</div>
					<div class="inputBox">
						<span>name on card:</span>
						<input type="text"placeholder="Mr.john deo">
					</div>
					<div class="inputBox">
						<span>Credit Card number:</span>
						<input type="number" placeholder="1111-2222-3333-4444">
					</div>
					<div class="inputBox">
						<span>Expired month:</span>
						<input type="text" placeholder="january">
					</div>
					<div class="flex">
						<div class="inputBox">
							<span>Expied year:</span>
							<input type="number"placeholder="2024">
						</div>
						<div class="inputBox">
							<span>CVV:</span>
							<input type="number"placeholder="1234">
						</div>
					</div>
					
				</div>
					
			</div>
			
			<input type="button" value="Proceed to Checkout" onclick="window.location.href='order tracking.html'" class="submit-btn">


		</form>
			
		
</div>	
</body>
</html>
